version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: hotel-mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: hotelpass2024
      MONGO_INITDB_DATABASE: luxury-haven
    volumes:
      - mongodb_data:/data/db
    networks:
      - hotel-network

  prometheus:
    image: prom/prometheus:latest
    container_name: hotel-prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - hotel-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:latest
    container_name: hotel-grafana
    restart: always
    ports:
      - "3030:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=hotelgraf2024
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - hotel-network
    depends_on:
      - prometheus

volumes:
  mongodb_data:
  prometheus_data:
  grafana_data:

networks:
  hotel-network:
    driver: bridge