<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-translate="admin.pageTitle">Dashboard • Luxury Haven Admin</title>
  <link rel="icon" href="assets/images/favicon.svg" type="image/svg+xml">
  <link rel="shortcut icon" href="assets/images/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="assets/images/favicon.svg">
  <script src="https://cdn.tailwindcss.com" crossorigin="anonymous"></script>
  <style>
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
    @keyframes pulse-glow { 0%,100% { box-shadow: 0 0 5px rgba(251,191,36,0.3); } 50% { box-shadow: 0 0 20px rgba(251,191,36,0.6); } }
    @keyframes pageExit { from { opacity: 1; transform: scale(1); } to { opacity: 0; transform: scale(0.95); } }
    
    .animate-fade-in-up { animation: fadeInUp 0.6s ease forwards; }
    .animate-fade-in-down { animation: fadeInDown 0.5s ease forwards; }
    .animate-scale-in { animation: scaleIn 0.3s ease forwards; }
    .page-exit { animation: pageExit 0.5s ease forwards; }
    
    body { font-family: 'Inter', sans-serif; }
    .title-font { font-family: 'Playfair Display', serif; }
    
    .stat-card { transition: all 0.3s ease; display: flex; flex-direction: column; justify-content: space-between; }
    .stat-card:hover { transform: translateY(-4px); box-shadow: 0 12px 35px rgba(0,0,0,0.4); }
    
    .booking-row { transition: all 0.2s ease; display: flex; flex-direction: column; }
    .booking-row:hover { background: rgba(251,191,36,0.03); }
    
    .tab-list { display: flex; gap: 0.75rem; overflow-x: auto; padding: 0.75rem 0; }
    .tab-list::-webkit-scrollbar { height: 8px; }
    .tab-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 9999px; }
    .tab-btn { flex: 0 0 auto; min-width: 8rem; white-space: nowrap; }
    .tab-btn.active { background: #f59e0b; color: #000; }
    
    .responsive-stats { display: grid; grid-template-columns: repeat(1, minmax(0, 1fr)); gap: 1rem; }
    .modal-overlay { backdrop-filter: blur(8px); }
    
    .btn-hover { transition: all 0.3s ease; }
    .btn-hover:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.3); }

    @media (min-width: 640px) {
      .responsive-stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (min-width: 1280px) {
      .responsive-stats { grid-template-columns: repeat(5, minmax(0, 1fr)); }
    }

    @media (max-width: 1024px) {
      header .max-w-7xl,
      nav .max-w-7xl,
      main {
        padding-left: 1rem;
        padding-right: 1rem;
      }

      header .flex {
        flex-wrap: wrap;
        justify-content: space-between;
        gap: 0.75rem;
      }

      nav .max-w-7xl {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }

      nav .max-w-7xl::-webkit-scrollbar {
        height: 8px;
      }

      nav .max-w-7xl::-webkit-scrollbar-thumb {
        background: rgba(255,255,255,0.15);
        border-radius: 9999px;
      }

      .tab-btn {
        min-width: 7.5rem;
        margin-bottom: 0.5rem;
      }

      .booking-row {
        flex-direction: column;
        align-items: stretch;
        text-align: left;
      }

      .booking-row > div:last-child {
        margin-top: 0.75rem;
      }

      .responsive-stats {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 640px) {
      .tab-btn {
        padding: 0.85rem 1rem;
        font-size: 0.82rem;
      }

      header .flex {
        gap: 0.5rem;
      }

      .stat-card {
        padding: 1rem;
      }

      .responsive-stats {
        grid-template-columns: 1fr;
      }

      .booking-row {
        gap: 1rem;
      }

      header .flex {
        align-items: flex-start;
      }

      header .flex > div:last-child {
        width: 100%;
        justify-content: flex-start;
      }
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body class="bg-zinc-950 text-white">

  <header class="bg-black/95 border-b border-white/10 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-8 py-4 flex flex-wrap justify-between items-center gap-4">
      <div class="flex flex-wrap items-center gap-3">
        <h1 class="text-2xl font-bold title-font">LUXURY HAVEN</h1>
        <span class="px-3 py-1 bg-amber-500/20 text-amber-400 text-xs rounded-full">Admin</span>
      </div>
      <div class="flex flex-wrap items-center gap-3">
        <div class="flex border border-white/30 rounded-full overflow-hidden text-sm">
          <button onclick="switchLang('ru')" id="btn-ru" class="px-4 py-1.5 transition hover:bg-amber-500/20">RU</button>
          <button onclick="switchLang('en')" id="btn-en" class="px-4 py-1.5 transition hover:bg-amber-500/20">EN</button>
        </div>
        <span id="admin-name" class="text-sm text-gray-400 hidden sm:inline-block"></span>
        <button onclick="logout()" data-translate="logout" class="px-5 py-2 border border-red-400/30 text-red-400 rounded-full hover:bg-red-400/10 transition text-sm">Logout</button>
      </div>
    </div>
  </header>

  <nav class="bg-zinc-900 border-b border-white/5">
    <div class="max-w-7xl mx-auto px-8 tab-list">
      <button class="tab-btn active px-6 py-3 text-sm font-medium rounded-t-lg transition" data-tab="dashboard" data-translate="dashboard">📊 Dashboard</button>
      <button class="tab-btn px-6 py-3 text-sm font-medium rounded-t-lg transition" data-tab="bookings" data-translate="bookings">📋 Bookings</button>
      <button class="tab-btn px-6 py-3 text-sm font-medium rounded-t-lg transition" data-tab="rooms" data-translate="rooms">🏨 Rooms</button>
      <button class="tab-btn px-6 py-3 text-sm font-medium rounded-t-lg transition" data-tab="accounting" data-translate="accounting">💰 Accounting</button>
      <button class="tab-btn px-6 py-3 text-sm font-medium rounded-t-lg transition" data-tab="history" data-translate="history">📜 History</button>
      <button class="tab-btn px-6 py-3 text-sm font-medium rounded-t-lg transition" data-tab="settings" data-translate="settings">⚙️ Settings</button>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-8 py-8">
    <div id="tab-content"></div>
  </main>

  <div id="alert-modal" class="hidden fixed inset-0 bg-black/80 modal-overlay flex items-center justify-center z-[300]">
    <div class="bg-zinc-900 rounded-3xl max-w-md w-full mx-4 p-8 text-center animate-scale-in">
      <div class="text-6xl mb-4" id="alert-icon">⚠️</div>
      <h3 class="text-2xl font-semibold mb-3" id="alert-title"></h3>
      <p class="text-gray-400 mb-6" id="alert-message"></p>
      <button onclick="closeAlert()" class="w-full py-4 bg-amber-500 hover:bg-amber-600 text-black font-semibold rounded-2xl transition" data-translate="close">Close</button>
    </div>
  </div>

  <!-- JS файлы -->
  <script src="js/admin-api.js"></script>
  <script src="js/admin-dashboard.js"></script>
  <script src="js/admin-bookings.js"></script>
  <script src="js/admin-rooms.js"></script>
  <script src="js/admin-accounting.js"></script>
  <script src="js/admin-history.js"></script>
  <script src="js/admin-settings.js"></script>
  <script>
    loadDashboard();
  </script>
</body>
</html>
